name: CI

on:
  push:
    branches: [v2-typescript]
  pull_request:
    branches: [v2-typescript]

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    # Real Redis available to the job 
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Copy gcra.lua into dist
        run: cp src/lib/gcra.lua dist/lib/gcra.lua

      # Smoke test
      - name: Smoke test
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          node dist/index.js &
          APP_PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/user)
          kill $APP_PID
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: expected 200, got $STATUS"
            exit 1
          fi
          echo "Smoke test passed"

  build-and-push-image:
    needs: typecheck-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/v2-typescript' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/rate-limiter:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/rate-limiter:${{ github.sha }}

      # Deployment step is deliberately left as a placeholder — it depends
      # entirely on where you're actually deploying (k8s, ECS, a plain VM
      # via SSH). Uncomment/adapt whichever matches your target:
      #
      # - name: Deploy to server via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SERVER_SSH_KEY }}
      #     script: |
      #       docker compose pull
      #       docker compose up -d