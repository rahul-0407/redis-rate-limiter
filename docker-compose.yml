services:
  redis:
    image: redis:7-alpine
    container_name: redis-rate-limiter
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rate-limit-service:
    build:
      context: .
      dockerfile: services/rate-limit-service/Dockerfile
    container_name: rate-limit-service
    environment:
      REDIS_URL: redis://redis:6379
      GRPC_PORT: 50051
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend-service:
    build:
      context: .
      dockerfile: services/backend-service/Dockerfile
    container_name: backend-service
    ports:
      - "3000:3000"
    environment:
      RATE_LIMIT_SERVICE_URL: rate-limit-service:50051
    depends_on:
      - rate-limit-service
    restart: unless-stopped

volumes:
  redis-data: